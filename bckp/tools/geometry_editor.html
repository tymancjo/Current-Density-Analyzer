<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSD Geometry Editor</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #left-panel { width: 200px; padding: 10px; border-right: 1px solid #ccc; }
        #main-content { flex-grow: 1; display: flex; flex-direction: column; }
        #canvas-container { flex-grow: 1; position: relative; }
        canvas { border: 1px solid #000; }
        #toolbar { padding: 10px; border-bottom: 1px solid #ccc; }
        #properties-panel { width: 250px; padding: 10px; border-left: 1px solid #ccc; }
        .tool-btn { margin-right: 5px; }
        .prop-group { margin-bottom: 15px; }
        .prop-group label { display: block; margin-bottom: 5px; }
        .prop-group input, .prop-group select { width: 100%; box-sizing: border-box; }
        #phase-management { margin-top: 20px; }
        #phase-list { list-style: none; padding: 0; }
        #phase-list li { margin-bottom: 10px; padding: 5px; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="left-panel">
        <h2>Tools</h2>
        <div id="toolbar">
            <button id="select-btn" class="tool-btn">Select</button>
            <button id="rect-btn" class="tool-btn">Rectangle</button>
            <button id="circle-btn" class="tool-btn">Circle</button>
        </div>
        <hr>
        <h2>Phases</h2>
        <div id="phase-management">
            <button id="add-phase-btn">Add Phase</button>
            <ul id="phase-list">
                <!-- Phase properties will be dynamically added here -->
            </ul>
        </div>
    </div>

    <div id="main-content">
        <div id="canvas-container">
            <canvas id="editor-canvas" width="800" height="600"></canvas>
        </div>
    </div>

    <div id="properties-panel">
        <h2>Properties</h2>
        <div id="shape-properties">
            <p>No shape selected</p>
        </div>
        <hr>
        <button id="generate-btn">Generate .ic File</button>
    </div>

    <script>
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d');

        // --- PRE-LOADED DATA ---
        const preloadedMaterials = `
name;   conductivity [S/m]; Alpha [1/K]; density [kg/m3]; cp [J/kg.K]; mi_r [-],Thermal Conductivity [W/m.K] 
copper; 56e6; 3.9e-3; 8960;385;1;400
FakeAl; 31e6; 4.4e-3; 4560;885;1;237
Aluminium; 31e6; 4.4e-3; 4560;885;1;237
Carbon Steel;  6.99e6; 6.5e-3; 7850; 490;100;50
Stainless Steel; 1.45e6; 1.0e-3; 7900; 500;1;17
Fake Carbon Steel;  6.99e6; 6.5e-3; 7850; 490;10;50
        `;

        // --- STATE ---
        let shapes = [];
        let phases = {};
        let materials = [];
        let currentTool = 'select';
        let selectedShape = null;
        let isDrawing = false;
        let isDragging = false;
        let startX, startY, dragOffsetX, dragOffsetY;

        const colors = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4'];

        // --- DOM ELEMENTS ---
        const selectBtn = document.getElementById('select-btn');
        const rectBtn = document.getElementById('rect-btn');
        const circleBtn = document.getElementById('circle-btn');
        const propertiesPanel = document.getElementById('shape-properties');
        const addPhaseBtn = document.getElementById('add-phase-btn');
        const phaseList = document.getElementById('phase-list');
        const generateBtn = document.getElementById('generate-btn');

        // --- EVENT LISTENERS ---
        selectBtn.addEventListener('click', () => { currentTool = 'select'; selectedShape = null; updatePropertiesPanel(); });
        rectBtn.addEventListener('click', () => { currentTool = 'rect'; selectedShape = null; updatePropertiesPanel(); });
        circleBtn.addEventListener('click', () => { currentTool = 'circle'; selectedShape = null; updatePropertiesPanel(); });
        addPhaseBtn.addEventListener('click', addPhase);
        generateBtn.addEventListener('click', generateIcFile);
        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('mouseup', onMouseUp);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedShape) deleteShape();
            }
            if (e.key === 'd' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                if (selectedShape) duplicateShape();
            }
        });


        // --- MATERIAL & PHASE MANAGEMENT ---
        function parseMaterials(text) {
            materials = text.split('\n')
                .map(line => line.trim())
                .filter(line => line && !line.startsWith('name;')) // Ignore header
                .map((line, index) => {
                    const parts = line.split(';');
                    // The backend is 0-indexed for materials
                    return { id: index, name: parts[0] ? parts[0].trim() : `Material ${index}` };
                });
            updatePhaseList();
        }

        function addPhase() {
            const existingIds = Object.keys(phases).map(Number);
            const newPhaseId = existingIds.length > 0 ? Math.max(...existingIds) + 1 : 1;
            phases[newPhaseId] = { color: colors[(newPhaseId - 1) % colors.length], current: [newPhaseId, 0, 0, 0], material: 0 };
            updatePhaseList();
        }

        function updatePhaseList() {
            phaseList.innerHTML = '';
            for (const id in phases) {
                if (id === '0') continue;
                const phase = phases[id];
                const li = document.createElement('li');
                li.style.borderLeft = `5px solid ${phase.color}`;
                const materialOptions = materials.map(m => `<option value="${m.id}" ${m.id === phase.material ? 'selected' : ''}>${m.name}</option>`).join('');

                li.innerHTML = `
                    <strong>Phase ${id}</strong>
                    <div class="prop-group">
                        <label>Irms (A)</label>
                        <input type="number" value="${phase.current[1]}" data-phase="${id}" data-prop="irms">
                        <label>Angle (°)</label>
                        <input type="number" value="${phase.current[2]}" data-phase="${id}" data-prop="angle">
                    </div>
                    <div class="prop-group">
                        <label>Material</label>
                        <select data-phase="${id}" data-prop="material">${materialOptions}</select>
                    </div>
                `;
                phaseList.appendChild(li);
            }
            addPhaseListListeners();
        }

        function addPhaseListListeners() {
            phaseList.querySelectorAll('input, select').forEach(el => {
                el.addEventListener('change', (e) => {
                    const id = e.target.dataset.phase;
                    const prop = e.target.dataset.prop;
                    const value = e.target.value;
                    if (prop === 'irms') phases[id].current[1] = parseFloat(value);
                    if (prop === 'angle') phases[id].current[2] = parseFloat(value);
                    if (prop === 'material') phases[id].material = parseInt(value);
                });
            });
        }


        // --- PROPERTIES PANEL & SHAPE MANIPULATION ---
        function updatePropertiesPanel() {
            if (!selectedShape) {
                propertiesPanel.innerHTML = '<p>No shape selected</p>';
                return;
            }
            const phaseOptions = Object.keys(phases).map(pId => `<option value="${pId}" ${pId == selectedShape.phase ? 'selected' : ''}>${pId === '0' ? 'Phase 0 (Cut)' : `Phase ${pId}`}</option>`).join('');
            let content = `
                <div class="prop-group">
                    <label>Phase</label>
                    <select id="prop-phase">${phaseOptions}</select>
                </div>
                <div class="prop-group">
                    <label>X: <input type="number" id="prop-x" value="${selectedShape.x.toFixed(2)}"></label>
                    <label>Y: <input type="number" id="prop-y" value="${selectedShape.y.toFixed(2)}"></label>
                </div>
            `;
            if (selectedShape.type === 'rect') {
                content += `
                    <div class="prop-group">
                        <label>Width: <input type="number" id="prop-w" value="${selectedShape.w.toFixed(2)}"></label>
                        <label>Height: <input type="number" id="prop-h" value="${selectedShape.h.toFixed(2)}"></label>
                    </div>
                `;
            } else if (selectedShape.type === 'circle') {
                content += `<div class="prop-group"><label>Radius: <input type="number" id="prop-r" value="${selectedShape.r.toFixed(2)}"></label></div>`;
            }
            content += 
`<button id="duplicate-shape-btn">Duplicate</button> <button id="delete-shape-btn">Delete</button>
`;
            propertiesPanel.innerHTML = content;
            addPropertiesListeners();
        }

        function addPropertiesListeners() {
            document.getElementById('prop-phase').addEventListener('input', (e) => selectedShape.phase = parseInt(e.target.value));
            document.getElementById('prop-x').addEventListener('input', (e) => selectedShape.x = parseFloat(e.target.value));
            document.getElementById('prop-y').addEventListener('input', (e) => selectedShape.y = parseFloat(e.target.value));
            if (selectedShape.type === 'rect') {
                document.getElementById('prop-w').addEventListener('input', (e) => selectedShape.w = parseFloat(e.target.value));
                document.getElementById('prop-h').addEventListener('input', (e) => selectedShape.h = parseFloat(e.target.value));
            } else if (selectedShape.type === 'circle') {
                document.getElementById('prop-r').addEventListener('input', (e) => selectedShape.r = parseFloat(e.target.value));
            }
            document.getElementById('delete-shape-btn').addEventListener('click', deleteShape);
            document.getElementById('duplicate-shape-btn').addEventListener('click', duplicateShape);
        }
        
        function deleteShape() {
            if (!selectedShape) return;
            const index = shapes.indexOf(selectedShape);
            if (index > -1) shapes.splice(index, 1);
            selectedShape = null;
            updatePropertiesPanel();
        }

        function duplicateShape() {
            if (!selectedShape) return;
            const newShape = JSON.parse(JSON.stringify(selectedShape)); // Deep copy
            newShape.x += 10;
            newShape.y += 10;
            shapes.push(newShape);
            selectedShape = newShape;
            updatePropertiesPanel();
        }

        // --- HIT DETECTION ---
        function isPointInRect(shape, mx, my) { return (mx >= shape.x && mx <= shape.x + shape.w && my >= shape.y && my <= shape.y + shape.h); }
        function isPointInCircle(shape, mx, my) { const dist = Math.sqrt((mx - shape.x) ** 2 + (my - shape.y) ** 2); return dist <= shape.r; }
        function getShapeAt(mx, my) {
            for (let i = shapes.length - 1; i >= 0; i--) {
                const s = shapes[i];
                if ((s.type === 'rect' && isPointInRect(s, mx, my)) || (s.type === 'circle' && isPointInCircle(s, mx, my))) return s;
            }
            return null;
        }

        // --- MOUSE EVENT HANDLING ---
        function onMouseDown(e) {
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;

            if (currentTool === 'select') {
                selectedShape = getShapeAt(startX, startY);
                updatePropertiesPanel();
                if (selectedShape) {
                    isDragging = true;
                    dragOffsetX = startX - selectedShape.x;
                    dragOffsetY = startY - selectedShape.y;
                }
            } else if (currentTool === 'rect' || currentTool === 'circle') {
                isDrawing = true;
                // Default to the last created phase, or 1 if none exist
                const lastPhaseId = parseInt(Object.keys(phases).filter(id => id !== '0').pop() || 1);
                const newShape = { type: currentTool, x: startX, y: startY, phase: lastPhaseId };
                if (currentTool === 'rect') { newShape.w = 0; newShape.h = 0; } else { newShape.r = 0; }
                shapes.push(newShape);
                selectedShape = newShape;
                updatePropertiesPanel();
            }
        }

        function onMouseMove(e) {
            if (!isDrawing && !isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (isDrawing) {
                if (currentTool === 'rect') {
                    selectedShape.w = mouseX - startX;
                    selectedShape.h = mouseY - startY;
                } else if (currentTool === 'circle') {
                    selectedShape.r = Math.sqrt((mouseX - startX) ** 2 + (mouseY - startY) ** 2);
                }
            } else if (isDragging) {
                selectedShape.x = mouseX - dragOffsetX;
                selectedShape.y = mouseY - dragOffsetY;
            }
            updatePropertiesPanel();
        }

        function onMouseUp(e) {
            if (isDrawing && selectedShape.type === 'rect') {
                if (selectedShape.w < 0) { selectedShape.x += selectedShape.w; selectedShape.w = Math.abs(selectedShape.w); }
                if (selectedShape.h < 0) { selectedShape.y += selectedShape.h; selectedShape.h = Math.abs(selectedShape.h); }
            }
            isDrawing = false;
            isDragging = false;
            updatePropertiesPanel();
        }

        // --- DRAWING FUNCTIONS ---
        function drawShape(shape) {
            if (shape.phase === 0) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
            } else {
                ctx.fillStyle = phases[shape.phase] ? phases[shape.phase].color : '#cccccc';
                ctx.strokeStyle = 'transparent';
                ctx.lineWidth = 0;
                ctx.setLineDash([]);
            }

            if (shape.type === 'rect') {
                ctx.fillRect(shape.x, shape.y, shape.w, shape.h);
                if (shape.phase === 0) ctx.strokeRect(shape.x, shape.y, shape.w, shape.h);
            } else if (shape.type === 'circle') {
                ctx.beginPath();
                ctx.arc(shape.x, shape.y, shape.r, 0, 2 * Math.PI);
                ctx.fill();
                if (shape.phase === 0) ctx.stroke();
            }
            ctx.setLineDash([]); // Reset for next shape
        }

        function drawSelection(shape) {
            ctx.strokeStyle = '#0000FF';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            if (shape.type === 'rect') {
                ctx.strokeRect(shape.x - 2, shape.y - 2, shape.w + 4, shape.h + 4);
            } else if (shape.type === 'circle') {
                ctx.beginPath();
                ctx.arc(shape.x, shape.y, shape.r + 4, 0, 2 * Math.PI);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw non-cutting shapes first
            for (const shape of shapes.filter(s => s.phase !== 0)) drawShape(shape);
            // Draw cutting shapes on top
            for (const shape of shapes.filter(s => s.phase === 0)) drawShape(shape);
            
            if (selectedShape) drawSelection(selectedShape);
            requestAnimationFrame(draw);
        }

        // --- FILE GENERATION ---
        function generateIcFile() {
            let fileContent = `# Geometry generated by CSD Web UI\n\n`;
            
            const usedPhases = new Set(shapes.map(s => s.phase));

            // Write material definitions for used phases
            for (const id of usedPhases) {
                if (id === 0) continue; // No material for phase 0
                fileContent += `material(${id},${phases[id].material})\n`;
            }
            fileContent += `\n`;

            // Write current definitions for used phases
            for (const id of usedPhases) {
                if (id === 0) continue; // No current for phase 0
                const p = phases[id];
                fileContent += `current(${id},${p.current[1]},${p.current[2]},0)\n`;
            }
            fileContent += `\n`;

            // Write shapes, skipping zero-size objects
            for (const shape of shapes) {
                if (shape.type === 'rect') {
                    if (shape.w === 0 || shape.h === 0) continue;
                    fileContent += `r(${shape.x},${shape.y},${shape.w},${shape.h},${shape.phase})\n`;
                } else if (shape.type === 'circle') {
                    if (shape.r === 0) continue;
                    // CSD uses diameter for circles in the ic file
                    fileContent += `c(${shape.x},${shape.y},${shape.r * 2},${shape.phase})\n`;
                }
            }

            const blob = new Blob([fileContent], { type: 'text/plain' });
            const link = document.createElement('a');
            link.download = 'geometry.ic';
            link.href = window.URL.createObjectURL(blob);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- MAIN ---
        function init() {
            // Phase 0 is special and reserved for cutting
            phases[0] = { color: 'rgba(255, 255, 255, 0.5)' };
            
            parseMaterials(preloadedMaterials); // Call parseMaterials with the preloaded data
            addPhase(); // Start with one actual phase
            updatePropertiesPanel();
            draw();
        }

        init();
    </script>

</body>
</html>
